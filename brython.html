<html>

  <head>
      <style>
        * {
         text-align: center 
        }
      </style>
    
      <meta charset="utf-8">
      <script type="text/javascript"
          src="https://cdn.jsdelivr.net/npm/brython@3.9.0/brython.min.js">
      </script>
  </head>

  <body onload="brython()">
    <input type="text" id="input" name="input" text="Text"><br>
    <button id="enter">Enter</button>
    
    <p id="output">Hello!</p>
    
    <script type="text/python">
      from browser import document, html
      from pydoc import help as get_help
      
      i = document['input']
      e = document['enter']
      o = document['output']
      
      def show(event):
        text = i.value
        o.text = text
        
        print(get_help(i))
      
      o.text = "Empty"
      e.bind("click",show)
    </script>
  </body>

</html>
