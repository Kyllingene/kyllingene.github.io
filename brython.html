<html>

  <head>
      <link rel="stylesheet" href="/styles.css?">
    
      <meta charset="utf-8">
      <script type="text/javascript"
      src="/brython/brython.js">
      </script>
  </head>

  <body onload="brython()">
    <a href="/">Back</a><br>
    <h1 id="score">0 - 0</h1>
    <canvas id="stage" width="700" height="600" style="width: 100%"></canvas>

    <script type="text/python">

      #Imports
      from browser import document as doc
      from browser_timer import request_animation_frame as raf
      from random import random
      #from time import sleep
      
      p_size = (3,100)
      b_size = 5
      
      #Setting up stage
      canvas = doc["stage"]
      pane = canvas.getContext("2d")
      
      width = canvas.width
      right_loc = width - 50
      ball_loc = width/2
      
      mid = canvas.height / 2
      
      pane.fillStyle = "white"

      score_pane = doc['score']

      #Functions & Classes
      def clear():
        pane.fillStyle = "#242424"
        pane.fillRect(0,0,canvas.width,canvas.height)
        pane.fill()
        pane.fillStyle = "white"

      class Paddle:
        def __init__(self, side):
          self.y = mid
          if side:
            self.x = right_loc
          else:
            self.x = 50

          self.side = side
          self.other = self.y + p_size[1]

        def move(self, direction):
          if direction and self.other < 590:
            self.y += direction

          elif (not direction) and (self.y > 10):
            self.y += direction

          self.other = self.y + p_size[1]

        def collide(self, obj):
          if self.side:
            obj.x -= 3
          else:
            obj.x += 3

          obj.velocity[0] = 0 - obj.velocity[0]
          obj.velocity[1] += random() + random()
      
      class Container:
        pass
        
      ball = Container()
      ball.velocity = [3,0]
      ball.x = ball_loc
      ball.y = mid

      left = Paddle(0)
      right = Paddle(1)

      score = [0,0]

      def keyCode(ev):
        key = ev.keyCode
        print(key)
        
        if key == 38:
          right.move(2)

        elif key == 40:
          right.move(-2)

        elif key == 87:
          left.move(2)

        elif key == 83:
          left.move(-2)
          
        ev.stopPropogation()

      def draw():
        #right
        pane.fillRect(right.x,right.y,*p_size)
        pane.fill()

        #left
        pane.fillRect(left.x,left.y,*p_size)
        pane.fill()

        #ball
        pane.fillRect(ball.x,ball.y,b_size,b_size)
        pane.fill()

      def show_score(score):
        score_pane.text = f"{score[0]} - {score[1]}"

      def bounce():
        global ball
        print(right.y <= ball.y <= right.other) or (right.y <= (ball.y+b_size) <= right.other)
        if (right.y <= ball.y <= right.other) or (right.y <= (ball.y+b_size) <= right.other):
          if ball.x == right.x:
            right.collide(ball)
            print('a')

        if (left.y <= ball.y <= left.other) or (left.y <= (ball.y+b_size) <= left.other):
          if ball.x == left.x:
            left.collide(ball)

        if ball.y > 585 or ball.y < 10:
          obj.velocity[1] = 0 - obj.velocity[1]

      doc["stage"].bind("keydown", keyCode) 
      
      #Game Loop
      def game():
        clear()
        global ball

        ball.x += ball.velocity[0]
        ball.y += ball.velocity[1]

        bounce()
        draw()

        if ball.x < 10:
          score[1] += 1
          show_score(score)
          ball.velocity = [-3,0]
          ball.x = ball_loc
          ball.y = mid

          left.y = mid
          right.y = mid

        elif ball.x > 690:
          score[0] += 1
          show_score(score)
          ball.velocity = [3,0]
          ball.x = ball_loc
          ball.y = mid

          left.y = mid
          right.y = mid

        
      def loop(i):
        global id
        id = raf(loop)
        game()
        
    
      loop(0)
    
    </script>


  </body>

</html>
