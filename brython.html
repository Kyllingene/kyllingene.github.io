<html>

  <head>
      <link rel="stylesheet" href="/styles.css?">
      <title>Pong | Kyllingene</title>  
      
      <style>
        #container {
          height: 90%;
          width: 100%;
        }
      </style>
    
      <meta charset="utf-8">
  </head>

  <body id="body">
    <a href="/">Back</a><br>
    <h3 id="score">0 - 0</h3>
    
    <div id="container">
      <canvas id="stage" height=100% width=100%></canvas>
    </div>

    <script>
      /*
       Keys:
       I/K: Up/Down Right Paddle
       W/S: Up/Down Left Paddle
      */
      
      var cs = document.getElementById("stage");
      var canvas = cs.getContext("2d");
      var body = document.getElementById("body");
      
      //Declaring constants
      var random = Math.random;
      var raf = requestAnimationFrame;
      
      var height = cs.height;
      var width = cs.width;
      
      canvas.fillStyle = "white";
      
      var top = height - 10;
      const bot = 10;
      
      var down = {"w": false, "s": false, "i": false, "k": false};
      
      var midx = width / 2;
      var midy = height / 2;
      
      var right_p = width - 25;
      const left_p = 25;
      
      const p_length = 20;
      const p_width = 2;
      const b_size = 5;
      
      var right = width - 10;
      const left = 10;
      
      class Paddle {
        constructor (x) {
          this.y = mid;
          this.x = x;
          this.other = this.y + p_length;
        }
        
        collide (other) {
          other.velx = (0 - other.velx);
          
          var change = random();
          var ychange = (change - (change / 2)) * 2;
          
          other.vely += ychange;
        }
        
        move (amount) {
          if (((this.y >= top) == false) && ((this.y <= bot) == false)) {
            this.y += amount;
            this.other = this.y + p_length;
          }
        }
        
        draw () {
          canvas.fillRect(this.x, this.y, p_width, p_height);
        }
      
      }
      
      function updateVars () {
        var height = cs.height;
        var width = cs.width;

        var top = height - 10;
        const bot = 10;

        var midx = width / 2;
        var midy = height / 2;

        var right_p = width - 25;
        const left_p = 25;

        var right = width - 10;
        const left = 10;
      }
      
      function keyDown (ev) {
        var key = ev.key.toLowerCase();
        if (key in down.keys()) {down[key] = true;}
      }
      
      function keyUp (ev) {
        var key = ev.key.toLowerCase();
        if (key in down.keys()) {down[key] = false;}
      }
      
      function movePaddles () {
        for (index=0;index<down.keys.length;index++) {
          var key = down.keys()[index];
          if (down[key] == true) {
            if (key == "w") {left_paddle.move(-2);}
            else if (key == "s") {left_paddle.move(2);}
            else if (key == "i") {right_paddle.move(-2);}
            else if (key == "k") {right_paddle.move(2);}  
          }
        }
      }
      
      function checkCollide () {
        if ((ball.y < right_paddle.y) && (ball.y > right_paddle.other) && (ball.x == right_paddle.x)) {
          right_paddle.collide(ball);
        }
        
        if ((ball.y < left_paddle.y) && (ball.y > left_paddle.other) && (ball.x == left_paddle.x)) {
          left_paddle.collide(ball);
        }
        
        if ((ball.y > top) || (ball.y < bot)) {ball.vely = (0 - ball.vely);}
      }
      
      function moveBall() {
        ball.x += ball.velx;
        ball.y += ball.vely;
        checkCollide();
      }
      
      function loop (i) {
        id = raf(loop);
        game();
      }
      
      function clear () {
        var temp = canvas.fillStyle;
        canvas.fillStyle = "#242424";
        canvas.fillRect(0,0,width,height);
        canvas.fillStyle = temp;
      }
      
      function ball_draw () {
        var x = ball.x;
        var y = ball.y;
        
        canvas.fillRect(x,y,b_size,b_size);
      }
      
      function draw () {
        clear();
        
        right_paddle.draw();
        left_paddle.draw();
        
        ball_draw();
      }
      
      function game () {
        movePaddles();
        moveBall();
        draw();
      }
      
      function resize (ev) {
        updateVars(); 
      }
      
      var right_paddle = new Paddle(right);
      var left_paddle = new Paddle(left);
      
      var ball = {x: midx, y: midy, velx: 3, vely: 0};
      
      stage.addEventListener("keydown",keyDown);
      stage.addEventListener("keyup",keyUp);
      body.addEventListener("resize",resize);
      
      loop(0);
    </script>


  </body>

</html>
