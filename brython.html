<html>

  <head>
      <style>
        * {
         text-align: center 
        }
      </style>
    
      <meta charset="utf-8">
      <script type="text/javascript"
          src="https://cdn.jsdelivr.net/npm/brython@3.9.0/brython.min.js">
      </script>
  </head>

  <body onload="brython()">
    <input type="text" id="input" name="input" text="Text"><br>
    <input type="button" id="enter" name="enter" text="Enter">
    
    <p id="output">Hello!</p>
    
    <script type="text/python">
      from browser import document, html
      
      i = document['input']
      e = document['enter']
      o = document['output']
      
      def show(event):
        text = i.text
        o.text = text
        
        i.text = ""
      
      o.text = "Empty"
      o.set("Empty")
      
      e.bind("click",show)
    </script>
  </body>

</html>
