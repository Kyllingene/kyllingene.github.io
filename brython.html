<html>

  <head>
      <link rel="stylesheet" href="/styles.css?">
    
      <meta charset="utf-8">
      <script type="text/javascript"
          src="/brython/brython.js">
      </script>
  </head>

  <body onload="brython()">
    <input type="text" id="string" name="input" placeholder="String Here"><br>
    <input type="text" id="key" name="input" placeholder="Key Here"><br>
    <button id="enter">Convert</button>
    <div id="output">Output goes here</div>
    
    
    <script type="text/python">
      from browser import document, html
      import binary5bit as b5
      
      s = document['string']
      s = document['key']
      e = document['enter']
      o = document['output']
      
      def encrypt(event):
        string = s.value
        key = s.value
        
        result = b5.fullencrypt(key,string)
        o.text = result
      
      e.bind("click",encrypt)
    </script>
  </body>

</html>
