<html>

  <head>
      <link rel="stylesheet" href="/styles.css?">
      <title>Pong | Kyllingene</title>  
    
      <meta charset="utf-8">
      <script type="text/javascript"
      src="/brython/brython.js">
      </script>
  </head>

  <body onload="brython()" id="body">
    <a href="/">Back</a><br>
    <h1 id="score">0 - 0</h1>
    <canvas id="stage" width="95%" height="95%"></canvas>

    <script type="text/python">

      #Imports
      from browser import document as doc
      from browser_timer import request_animation_frame as raf
      from random import random
      #from time import sleep
      
      p_size = (3,100)
      b_size = 5
      
      #Setting up stage
      canvas = doc["stage"]
      pane = canvas.getContext("2d")
      
      width = canvas.width
      height = canvas.height
      
      right_loc = width - 50
      ball_loc = width/2
      
      top = height - 10
      mid = height / 2
      bot = 10
      
      right = width - 10
      left = 10
      
      pane.fillStyle = "white"

      score_pane = doc['score']

      #Functions & Classes
      def clear():
        pane.fillStyle = "#242424"
        pane.fillRect(0,0,canvas.width,canvas.height)
        pane.fill()
        pane.fillStyle = "white"

      class Paddle:
        def __init__(self, side):
          self.y = mid
          if side:
            self.x = right_loc
          else:
            self.x = 50

          self.side = side
          self.other = self.y + p_size[1]

        def move(self, direction):
          print("MOVING")
          if direction and self.other < top:
            self.y += direction

          elif (not direction) and (self.y > 10):
            self.y += direction

          self.other = self.y + p_size[1]

        def collide(self, obj):
          if self.side:
            obj.x -= 3
          else:
            obj.x += 3

          obj.velocity[0] = 0 - obj.velocity[0]
          obj.velocity[1] += random() + (random() / 2)
      
      class Container:
        pass
        
      ball = Container()
      ball.velocity = [3,0]
      ball.x = ball_loc
      ball.y = mid

      left = Paddle(0)
      right = Paddle(1)

      score = [0,0]
      
      down = {73:False,75:False,87:False,83:False}
      
      def keyCode(ev):
        if ev.type == "keydown":
      
          key = ev.keyCode
          print(f"UP: {key}")

          if key == 87:
            down.update({87:True})

          elif key == 83:
            down.update({83:True})

          elif key == 105:
            down.update({105:True})
            
          elif key == 107:
            down.update({107:True})
            
        elif ev.type == "keyup":
          key = ev.keyCode
          print(f"DOWN: {key}")

          if key == 38:
            down.update({38:False})

          elif key == 40:
            down.update({40:False})

          elif key == 105:
            down.update({105:False})
            
          elif key == 107:
            down.update({107:False})
            
        print(down)

      def draw():
        #right
        pane.fillRect(right.x,right.y,*p_size)
        pane.fill()

        #left
        pane.fillRect(left.x,left.y,*p_size)
        pane.fill()

        #ball
        pane.fillRect(ball.x,ball.y,b_size,b_size)
        pane.fill()

      def show_score(score):
        score_pane.text = f"{score[0]} - {score[1]}"

      def bounce():
        global ball
        if (right.y <= ball.y <= right.other) or (right.y <= (ball.y+b_size) <= right.other):
          if ball.x == right.x:
            right.collide(ball)

        if (left.y <= ball.y <= left.other) or (left.y <= (ball.y+b_size) <= left.other):
          if ball.x == left.x:
            left.collide(ball)

        if ball.y > top-b_size or ball.y < bot:
          ball.velocity[1] = 0 - ball.velocity[1]
      
      def keyDown(ev):
        global down
        convert = {105:73,107:75,119:87,115:83}
        key = ev.keyCode
        
        if key not in convert:
          return
        
        key = convert[key]
        down.update({key:True})
        
      def keyUp(ev):
        global down
        key = ev.keyCode
        if key in down:
          down.update({key:False})
      
      doc["body"].bind("keydown", keyDown) 
      doc["body"].bind("keyup", keyUp) 
      
      def move():
        for key,val in down.items():
          if val:
            if key == 87:
              left.move(-2)
              
            elif key == 83:
              left.move(2)
              
            elif key == 73:
              right.move(-2)
              
            elif key == 75:
              right.move(2)
              
      #Game Loop
      def game():
        clear()
        global ball

        ball.x += ball.velocity[0]
        ball.y += ball.velocity[1]
        
        move()
        bounce()
        draw()

        if ball.x < left:
          score[1] += 1
          show_score(score)
          ball.velocity = [-3,0]
          ball.x = ball_loc
          ball.y = mid

          left.y = mid
          right.y = mid

        elif ball.x > right:
          score[0] += 1
          show_score(score)
          ball.velocity = [3,0]
          ball.x = ball_loc
          ball.y = mid

          left.y = mid
          right.y = mid

        
      def loop(i):
        global id
        id = raf(loop)
        game()
        
    
      loop(0)
    
    </script>


  </body>

</html>
